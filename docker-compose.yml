services:
  checking-projections:
    build: .
    container_name: checking-projections
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
      - ./recurring.yaml:/app/recurring.yaml
      - ./.env:/app/.env
      - ./secrets:/app/secrets
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/New_York
