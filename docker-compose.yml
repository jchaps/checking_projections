services:
  checking-projections:
    build: .
    container_name: checking-projections
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./recurring.yaml:/app/recurring.yaml:ro
    secrets:
      - plaid_tokens
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Chicago

secrets:
  plaid_tokens:
    file: ./secrets/plaid_tokens.json
